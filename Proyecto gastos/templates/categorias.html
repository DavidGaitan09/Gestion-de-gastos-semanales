{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>Nueva Categoría</h2>
    <form action="/categorias" method="POST" style="display:flex; gap:1rem; align-items: flex-end;">
        <div style="flex-grow: 1;">
            <label>Nombre de la Categoría</label>
            <input type="text" name="nombre" placeholder="Ej. Salud" required>
        </div>
        <button type="submit" class="btn-primary">Añadir</button>
    </form>
</div>
<div class="card">
    <h3 style="margin-top: 0;">Categorías Activas</h3>
    <ul style="padding: 0;">
        {% for c in categorias %}
        <li style="padding: 1rem; border-bottom: 1px solid var(--border); list-style: none; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600;">{{ c.nombre }}</span>
            <span class="badge" style="background: #f1f5f9; color: #64748b;">ID: {{ c.id }}</span>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
