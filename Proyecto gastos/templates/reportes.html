{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>Reporte de Inversión por Categoría</h2>
    <form action="/reportes" method="GET" class="form-grid">
        <div style="flex-grow: 1;">
            <label>Categoría</label>
            <select name="categoria_id">
                <option value="">Todas</option>
                {% for c in categorias %}
                <option value="{{ c.id }}" {{ 'selected' if request.args.get('categoria_id') == c.id|string }}>{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary">Filtrar</button>
    </form>
</div>
<div class="card">
    <table>
        <thead><tr><th>Descripción</th><th>Monto</th></tr></thead>
        <tbody>
            {% for g in gastos %}
            <tr><td>{{ g.descripcion }}</td><td style="font-weight: 700;">${{ "{:,.0f}".format(g.monto) }}</td></tr>
            {% endfor %}
        </tbody>
        <tfoot>
            <tr>
                <td style="text-align:right; font-weight:800; padding:1.5rem;">TOTAL EN ESTE FILTRO:</td>
                <td style="font-weight:800; color:var(--success); font-size:1.5rem;">${{ "{:,.0f}".format(total_seleccion) }}</td>
            </tr>
        </tfoot>
    </table>
</div>
{% endblock %}
