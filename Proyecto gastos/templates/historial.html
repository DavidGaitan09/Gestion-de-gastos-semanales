{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>Historial Mensual</h2>
    <form action="/historial_mensual" method="GET" class="form-grid">
        <div>
            <label>Mes</label>
            <select name="mes">
                <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
                <option value="04">Abril</option><option value="05" selected>Mayo</option>
            </select>
        </div>
        <div><label>Año</label><input type="number" name="anio" value="2026"></div>
        <button type="submit" class="btn-primary">Consultar</button>
    </form>
</div>
{% if gastos %}
<div class="card">
    <h3 style="color: var(--primary);">Total Gastado en el Mes: ${{ "{:,.0f}".format(total_mes) }}</h3>
    <table>
        <thead><tr><th>Fecha</th><th>Concepto</th><th>Monto</th></tr></thead>
        <tbody>
            {% for g in gastos %}
            <tr><td>{{ g.fecha }}</td><td>{{ g.descripcion }}</td><td>${{ "{:,.0f}".format(g.monto) }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}
{% endblock %}
